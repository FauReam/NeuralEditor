<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heartscape — 心动模拟</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf5f7;--surface:#fff;--surface2:#fef8fa;--border:#f0dce3;
  --text:#3d2c33;--dim:#9e8a92;--accent:#d4456a;--accent2:#e86582;
  --green:#4caf84;--warn:#f0a040;--bar-bg:#f5e0e8;
}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{background:linear-gradient(135deg,#fef0f3,#fdf6f0);padding:20px;text-align:center;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:1.3em;color:var(--accent)}
.sidebar-header .sub{font-size:.8em;color:var(--dim);margin-top:4px}
.char-card{padding:16px 20px}
.char-card .name{font-size:1.2em;font-weight:bold;color:var(--accent)}
.char-card .rel{font-size:.85em;color:var(--dim);margin:2px 0}
.char-card .persona{font-size:.82em;color:var(--dim);margin:6px 0;line-height:1.5}
.affection-wrap{margin:10px 0}
.affection-wrap .label{font-size:.78em;color:var(--dim);display:flex;justify-content:space-between}
.affection-bar{height:22px;background:var(--bar-bg);border-radius:11px;overflow:hidden;margin:4px 0}
.affection-fill{height:100%;background:linear-gradient(90deg,#f0a0b0,var(--accent));border-radius:11px;transition:width .6s ease;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7em;font-weight:bold;min-width:36px}
.scene-info{padding:10px 20px;border-top:1px solid var(--border)}
.scene-info h3{font-size:.85em;color:var(--accent);margin-bottom:4px}
.scene-info p{font-size:.82em;color:var(--dim);line-height:1.5}
.choices-box{padding:12px 20px;border-top:1px solid var(--border)}
.choices-box h3{font-size:.85em;color:var(--accent);margin-bottom:8px}
.choice-btn{display:block;width:100%;padding:10px 14px;margin:6px 0;background:var(--bg);border:1.5px solid #f0d0d8;border-radius:10px;font-size:.85em;text-align:left;cursor:pointer;transition:all .2s;color:var(--text);font-family:inherit}
.choice-btn:hover{border-color:var(--accent);background:var(--surface2);transform:translateX(3px)}
.choice-btn .delta{font-size:.8em;color:var(--dim);float:right}
.save-area{padding:14px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.save-area .row{display:flex;gap:8px}
.save-area input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85em;outline:none;font-family:inherit}
.save-area input:focus{border-color:var(--accent)}
.save-area button{flex:1;padding:8px 12px;border:none;border-radius:8px;font-size:.85em;font-weight:600;cursor:pointer;font-family:inherit}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:14px 22px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px}
.chat-header .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.chat-header .title{font-size:.9em;color:var(--dim)}
.chat-main{flex:1;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:4px}
.chat-msg{padding:10px 16px;border-radius:14px;max-width:80%;word-break:break-word;line-height:1.6;font-size:.93em;animation:fadeIn .3s ease}
.chat-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-radius:14px 14px 4px 14px}
.chat-msg.assistant{background:var(--surface);border:1px solid var(--border);align-self:flex-start;border-radius:14px 14px 14px 4px}
.chat-msg.system{background:transparent;border:1px dashed var(--border);color:var(--dim);font-size:.82em;align-self:center;text-align:center;max-width:90%}
.chat-input-bar{padding:14px 22px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px}
.chat-input-bar input{flex:1;padding:12px 18px;border:1.5px solid var(--border);border-radius:24px;font-size:.95em;outline:none;font-family:inherit;background:var(--bg)}
.chat-input-bar input:focus{border-color:var(--accent)}
.settings-btn{background:none;border:none;font-size:1.2em;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
.settings-btn:hover{background:var(--bg)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;display:none}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:28px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{font-size:1.15em;color:var(--accent);margin-bottom:16px}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:.82em;color:var(--dim);margin-bottom:4px}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9em;outline:none;font-family:inherit}
.modal .field input:focus,.modal .field textarea:focus{border-color:var(--accent)}
.modal .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.tip{background:#fef8fa;border:1px solid #f0dce3;border-radius:8px;padding:10px 14px;font-size:.82em;color:var(--dim);margin-top:12px}
.load-btn{font-size:.8em;padding:4px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text);font-family:inherit;margin:2px}
.load-btn:hover{border-color:var(--accent)}
.saves-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){
  .app{flex-direction:column}
  .sidebar{width:100%;min-width:100%;max-height:45vh;border-right:none;border-bottom:1px solid var(--border)}
  .chat-msg{max-width:90%}
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Heartscape</h1>
      <div class="sub">本地 LLM 恋爱模拟</div>
    </div>
    <div class="char-card" id="char-card">
      <div class="name" id="char-name">小棠</div>
      <div class="rel" id="char-rel">陌生人</div>
      <div class="persona" id="char-persona">温柔 / 害羞 / 细心</div>
      <div class="affection-wrap">
        <div class="label"><span>好感度</span><span id="aff-label">0</span></div>
        <div class="affection-bar"><div class="affection-fill" id="aff-fill" style="width:50%">0</div></div>
      </div>
    </div>
    <div class="scene-info" id="scene-info">
      <h3>📍 当前场景</h3>
      <p id="scene-desc">尚未开始</p>
    </div>
    <div class="choices-box" id="choices-box">
      <h3>🎭 可选行动</h3>
      <div id="choice-list"></div>
    </div>
    <div class="save-area">
      <div class="row">
        <input id="save-slot" placeholder="存档名（回车保存）" value="auto" onkeydown="if(event.key==='Enter')saveGame()">
      </div>
      <div class="row">
        <button onclick="saveGame()" style="background:var(--accent);color:#fff">💾 保存</button>
        <button onclick="loadGame()" style="background:var(--bg);color:var(--text);border:1px solid var(--border)">📂 读取</button>
      </div>
      <div class="saves-list" id="saves-list"></div>
    </div>
  </aside>

  <!-- Main chat -->
  <main class="main-area">
    <div class="chat-header">
      <div class="dot" id="llm-dot" style="background:#ccc"></div>
      <span class="title" id="chat-title">对话中</span>
      <div style="flex:1"></div>
      <button class="settings-btn" onclick="showSettings()" title="设置">⚙️</button>
    </div>
    <div class="chat-main" id="chat-main">
      <div class="chat-msg system">欢迎来到 Heartscape。点击右下角按钮开始新游戏，或加载存档。</div>
    </div>
    <div class="chat-input-bar">
      <input id="chat-input" placeholder="输入你想说的话..." onkeydown="if(event.key==='Enter')sendMessage()" disabled>
      <button onclick="sendMessage()" style="padding:10px 18px;border:none;border-radius:24px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">发送</button>
    </div>
  </main>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>游戏设置</h2>
    <div class="field">
      <label>角色配置文件</label>
      <select id="set-character">
        <option value="config/characters/default.yaml">小棠（默认）</option>
      </select>
    </div>
    <div class="field">
      <label>LLM 模型路径（留空使用预设回复）</label>
      <input id="set-model-path" placeholder="如: models/Qwen2.5-7B-Instruct">
    </div>
    <div class="tip">不填模型路径则使用内置预设回复，适合快速体验剧情。</div>
    <div class="btn-row">
      <button onclick="closeSettings()" class="load-btn">取消</button>
      <button onclick="applySettings()" style="padding:8px 20px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer">开始新游戏</button>
    </div>
  </div>
</div>

<script>
let gameState = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  return fetch(path, opts).then(r => r.json());
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'chat-msg ' + role;
  el.textContent = text;
  $('chat-main').appendChild(el);
  $('chat-main').scrollTop = $('chat-main').scrollHeight;
}

function $(id) { return document.getElementById(id); }

// ══════════════ Settings ══════════════
function showSettings() {
  $('settings-modal').classList.add('show');
}
function closeSettings() {
  $('settings-modal').classList.remove('show');
}

async function applySettings() {
  const character = $('set-character').value;
  const modelPath = $('set-model-path').value.trim();
  closeSettings();

  addMsg('system', '正在初始化游戏...');
  const res = await api('POST', '/api/romance/new', { character, model_path: modelPath });
  if (res.ready) {
    updateUI(res);
    addMsg('system', '游戏已就绪。开始对话吧！');
    $('chat-input').disabled = false;
  } else {
    addMsg('system', '初始化失败，请重试。');
  }
}

// ══════════════ Chat ══════════════
async function sendMessage() {
  const input = $('chat-input');
  const msg = input.value.trim();
  if (!msg || !gameState) return;

  addMsg('user', msg);
  input.value = '';
  addMsg('assistant', '*思考中...*');
  const loadingEl = $('chat-main').lastChild;

  const res = await api('POST', '/api/romance/chat', { message: msg });
  if (loadingEl) loadingEl.textContent = res.response || '*嗯...*';
  if (res.character) {
    updateCharacterUI(res.character);
    gameState.character = res.character;
  }
  if (res.choices) updateChoices(res.choices);
  if (res.scene) {
    $('scene-desc').textContent = gameState?.character?.name ? `${gameState.character.name}的日常` : '日常';
  }
  $('chat-main').scrollTop = $('chat-main').scrollHeight;
}

// ══════════════ Choices ══════════════
async function makeChoice(choiceId) {
  addMsg('system', '你做出了选择...');
  const res = await api('POST', '/api/romance/choice', { choice_id: choiceId });
  if (res.ok) {
    if (res.affection_delta) {
      addMsg('system', `好感度 ${res.affection_delta > 0 ? '+' : ''}${res.affection_delta}`);
    }
    if (res.new_scene) {
      $('scene-desc').textContent = res.scene_desc || res.new_scene;
    }
    updateCharacterUI(res.character);
    updateChoices(res.choices || []);
  } else {
    addMsg('system', '❌ ' + (res.error || '选择失败'));
  }
}

// ══════════════ Save / Load ══════════════
async function saveGame() {
  const slot = $('save-slot').value.trim() || 'auto';
  const res = await api('POST', '/api/romance/save', { slot });
  if (res.ok) {
    addMsg('system', `已保存到: ${slot}`);
    localStorage.setItem('heartscape_last_slot', slot);
    loadSaveList();
  }
}

async function loadGame(slot) {
  const s = slot || $('save-slot').value.trim() || localStorage.getItem('heartscape_last_slot') || 'auto';
  const res = await api('POST', '/api/romance/load', { slot: s });
  if (res.ok && res.state) {
    updateUI(res.state);
    addMsg('system', `已读取存档: ${s}`);
    $('chat-input').disabled = false;
  } else {
    addMsg('system', '❌ 存档不存在: ' + s);
  }
}

async function loadSaveList() {
  const res = await api('GET', '/api/romance/saves');
  if (res.saves && res.saves.length) {
    $('saves-list').innerHTML = res.saves.slice(0, 8).map(s =>
      `<button class="load-btn" onclick="loadGame('${s.name}')" title="${s.mtime}">${s.name}</button>`
    ).join('');
  }
}

// ══════════════ UI update ══════════════
function updateUI(state) {
  gameState = state;
  updateCharacterUI(state.character);
  updateChoices(state.available_choices || []);
  if (state.current_scene) {
    $('scene-desc').textContent = state.scene_desc || state.current_scene;
  }
  const dot = $('llm-dot');
  dot.style.background = state.has_llm ? 'var(--green)' : '#ccc';
  $('chat-title').textContent = state.has_llm ? 'LLM 对话中' : '预设模式';
}

function updateCharacterUI(char) {
  if (!char) return;
  $('char-name').textContent = char.name;
  $('char-rel').textContent = char.relationship;
  $('char-persona').textContent = (char.personality || []).join(' / ') || char.background || '';
  const aff = char.affection || 0;
  const pct = Math.max(0, Math.min(100, (aff + 100) / 2));
  $('aff-fill').style.width = pct + '%';
  $('aff-fill').textContent = aff;
  $('aff-label').textContent = aff;
}

function updateChoices(choices) {
  const list = $('choice-list');
  if (!choices.length) {
    list.innerHTML = '<span style="font-size:.8em;color:var(--dim)">暂无可用选择，继续对话吧</span>';
  } else {
    list.innerHTML = choices.map(c =>
      `<button class="choice-btn" onclick="makeChoice('${c.id}')">${esc(c.text)}<span class="delta">${c.affection > 0 ? '+' + c.affection : c.affection}</span></button>`
    ).join('');
  }
}

// ══════════════ Init ══════════════
loadSaveList();
$('settings-modal').classList.add('show'); // Show settings on first load

// Try restore from localStorage preference
const lastSlot = localStorage.getItem('heartscape_last_slot');
if (lastSlot) {
  $('save-slot').value = lastSlot;
  setTimeout(async () => {
    const res = await api('POST', '/api/romance/load', { slot: lastSlot });
    if (res.ok && res.state) {
      updateUI(res.state);
      addMsg('system', `已自动恢复存档: ${lastSlot}`);
      $('chat-input').disabled = false;
      closeSettings();
    }
  }, 200);
}
</script>
</body>
</html>
