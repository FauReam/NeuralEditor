engine:
  name: "Heartscape Engine"
  version: "0.1.0"
  save_dir: "data/saves"
  memory_dir: "data/memories"

llm:
  model_path: "models/Qwen2.5-7B-Instruct"
  context_length: 4096
  max_tokens: 256
  temperature: 0.8
  top_p: 0.9
  repeat_penalty: 1.1
  # LoRA适配器路径（可选）
  lora_path: null

  # Ollama配置（替代llama.cpp）
  use_ollama: false
  ollama_model: "qwen2.5:7b"

memory:
  embedding_model: "BAAI/bge-small-zh-v1.5"
  vector_db_path: "data/memories/chroma"
  short_term_turns: 10
  long_term_top_k: 3
  similarity_threshold: 0.75

character:
  default_path: "config/characters/default.yaml"
  affection:
    min: -100
    max: 100
    initial: 0
    # 好感度变化阻尼，防止剧烈波动
    damping: 0.8

story:
  auto_save_interval: 5  # 每5轮对话自动存档
  max_history_turns: 100
